# Aquador Workflow Admin Feature Development

## Action

Follow the admin-feature-development workflow:
1. Create or update admin page component under src/app/admin/...
2. Implement or update client logic under src/app/admin/... or src/components/admin/...
3. Add or update API route under src/app/api/admin/...
4. Update shared types or logic in src/lib/...
5. Update or create Supabase migration(s) in supabase/migrations/
6. Optionally update sidebar/navigation in src/components/admin/AdminSidebar.tsx

## Evidence

- Workflow detected from commit patterns
- Frequency: ~2x per month
- Files: src/app/admin/*/page.tsx, src/app/admin/*/*.tsx, src/app/api/admin/*/route.ts

